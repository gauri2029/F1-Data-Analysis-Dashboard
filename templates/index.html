<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula 1 Data Analysis Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">F1 Data Analysis</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#drivers">Drivers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#teams">Teams</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#races">Races</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">Formula 1 Data Analysis Dashboard</h1>
        
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Season Selection</div>
                    <div class="card-body">
                        <select id="seasonSelect" class="form-select mb-3">
                            <option value="2023">2023</option>
                            <option value="2024">2024</option>
                        </select>
                        <button id="loadSeasonBtn" class="btn btn-primary">Load Season Data</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Race Selection</div>
                    <div class="card-body">
                        <select id="raceSelect" class="form-select mb-3">
                            <option value="">Select a race...</option>
                        </select>
                        <button id="loadRaceBtn" class="btn btn-primary">Load Race Data</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <ul class="nav nav-tabs card-header-tabs" id="analysisTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="lap-times-tab" data-bs-toggle="tab" data-bs-target="#lap-times" type="button" role="tab">Lap Times</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="podiums-tab" data-bs-toggle="tab" data-bs-target="#podiums" type="button" role="tab">Podium Finishes</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="tire-age-tab" data-bs-toggle="tab" data-bs-target="#tire-age" type="button" role="tab">Tire Age Analysis</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="qualifying-tab" data-bs-toggle="tab" data-bs-target="#qualifying" type="button" role="tab">Qualifying Positions</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="weather-tab" data-bs-toggle="tab" data-bs-target="#weather" type="button" role="tab">Weather Conditions</button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body">
                        <div class="tab-content" id="analysisTabContent">
                            <!-- Lap Times Comparison -->
                            <div class="tab-pane fade show active" id="lap-times" role="tabpanel">
                                <h3>Average Lap Times Comparison</h3>
                                <div id="lapTimesChart" class="chart-container"></div>
                            </div>
                            
                            <!-- Podium Finishes -->
                            <div class="tab-pane fade" id="podiums" role="tabpanel">
                                <h3>Podium Finishes by Team</h3>
                                <div id="podiumsChart" class="chart-container"></div>
                            </div>
                            
                            <!-- Tire Age Analysis -->
                            <div class="tab-pane fade" id="tire-age" role="tabpanel">
                                <h3>Lap Times by Tire Age</h3>
                                <div id="tireAgeChart" class="chart-container"></div>
                            </div>
                            
                            <!-- Qualifying Positions -->
                            <div class="tab-pane fade" id="qualifying" role="tabpanel">
                                <h3>Average Qualifying Positions</h3>
                                <div id="qualifyingChart" class="chart-container"></div>
                            </div>
                            
                            <!-- Weather Conditions -->
                            <div class="tab-pane fade" id="weather" role="tabpanel">
                                <h3>Lap Times by Weather Conditions</h3>
                                <div id="weatherChart" class="chart-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Plotly.js for Data Visualization -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
